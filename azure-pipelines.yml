trigger:
- main
- fix/*
- feature/*

pool:
  name: 202605-ado-ai

steps:
#- task: UsePythonVersion@0
#  inputs:
#    versionSpec: '3.x'
#  displayName: 'Use Python 3.x'

- script: pip install -r requirements.txt
  displayName: 'Install dependencies'

- script: pip install pytest pytest-cov bandit
  displayName: 'Install test and security tools'

- script: pytest --junitxml=test-results.xml --cov=. --cov-report=xml:coverage.xml --cov-report=html:htmlcov
  displayName: 'Run tests with coverage'

- task: PublishTestResults@2
  inputs:
    testResultsFiles: 'test-results.xml'
    testRunTitle: 'Python Tests'
  condition: always()

- task: PublishCodeCoverageResults@1
  inputs:
    codeCoverageTool: 'Cobertura'
    summaryFileLocation: 'coverage.xml'
    reportDirectory: 'htmlcov'
  condition: always()

- script: bandit -r . -f json -o bandit-report.json || true
  displayName: 'Run Bandit security scan'

- script: |
    if [ ! -f bandit-report.json ]; then
      echo '{}' > bandit-report.json
    fi
  displayName: 'Ensure Bandit report exists'
  condition: always()

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'bandit-report.json'
    ArtifactName: 'BanditReport'

- script: |
    # Determine version using semantic versioning (placeholder for v1.0.0)
    VERSION="v1.0.0"
    git tag $VERSION
    git push origin $VERSION
  displayName: 'Create Git Tag for Release'

- script: |
    # Generate release notes in CHANGELOG.md
    echo "# Changelog" > CHANGELOG.md
    echo "" >> CHANGELOG.md
    echo "## v1.0.0" >> CHANGELOG.md
    echo "" >> CHANGELOG.md
    git log --oneline --pretty=format:"- %s (%h)" | head -20 >> CHANGELOG.md
  displayName: 'Generate Release Notes'

- script: |
    # Zip the application
    zip -r app.zip . -x "*.git*" "*_work*" "*bin*" "*externals*" "*myagent/_diag*" "*myagent/_work*"
  displayName: 'Zip Application'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'app.zip'
    ArtifactName: 'ApplicationZip'
  condition: always()

- script: |
    if command -v trivy &> /dev/null; then
      echo "Trivy already installed"
    else
      echo "Installing Trivy..."
      wget -q https://github.com/aquasecurity/trivy/releases/download/v0.50.1/trivy_0.50.1_Linux-64bit.tar.gz
      tar -xzf trivy_0.50.1_Linux-64bit.tar.gz
      chmod +x ./trivy
      export PATH=$PWD:$PATH
    fi
    trivy filesystem --format json --output trivy-report.json . || true
    if [ -f trivy-report.json ]; then
      echo "Trivy report generated successfully"
    else
      echo "Warning: Trivy report was not generated"
      echo '{}' > trivy-report.json
    fi
  displayName: 'Run Trivy dependency scan'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'trivy-report.json'
    ArtifactName: 'TrivyReport'
  condition: always()